name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check orchestrator
        run: cargo check -p almanach-orchestrator

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run tests
        run: cargo test -p almanach-orchestrator
