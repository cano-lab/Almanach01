name: Deploy Almanach

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add VPS host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Configure SSH
        run: |
          cat <<EOF > ~/.ssh/config
          Host almanach-vps
            HostName ${{ secrets.VPS_HOST }}
            User ${{ secrets.VPS_USER || 'deploy' }}
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy to VPS
        run: ssh almanach-vps /opt/almanach/scripts/deploy.sh
